server:
  port: ${SERVER_PORT:8080}

media:
  storage-root: ${MEDIA_STORAGE_ROOT:/www/wwwroot/esxz-old/current}

spring:
  application:
    name: backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/esxz_sj_jypt?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
  sql:
    init:
      mode: ${DB_INIT_MODE:never}
      encoding: UTF-8
      schema-locations: ${DB_SCHEMA_LOCATIONS:classpath:db/schema.sql}
      data-locations: ${DB_DATA_LOCATIONS:classpath:db/data.sql}
  servlet:
    multipart:
      max-file-size: 80MB
      max-request-size: 80MB
